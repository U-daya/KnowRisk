services:
  - type: web
    name: knowrisk
    runtime: python
    plan: free

    # Backend only — the React frontend is built and hosted separately on Vercel.
    buildCommand: pip install -r requirements.txt

    # Start the FastAPI backend (serves all /api/* routes)
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT

    envVars:
      # ── AMD Droplet connection ────────────────────────────────────────────
      # Set LLM_BASE_URL to your droplet's vLLM endpoint when it's live.
      # Leave blank → app runs in SYNTHETIC FALLBACK mode, clearly labeled.
      - key: LLM_BASE_URL
        value: ""          # e.g. http://<droplet-ip>:8001/v1
        sync: false

      - key: LLM_MODEL
        value: "Qwen/Qwen2.5-7B-Instruct"

      - key: LLM_API_KEY
        value: "not-needed"   # vLLM doesn't need a key
        sync: false

      # production = CORS locked to same-origin; development = open to localhost:5173
      - key: KNOWRISK_ENV
        value: "production"
